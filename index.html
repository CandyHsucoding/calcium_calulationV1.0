<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>校園高鈣精密檢核系統 v3.0 (正式發布版)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { 
            font-family: 'Inter', system-ui, -apple-system, sans-serif; 
            background-color: #f1f5f9; 
            margin: 0;
            overflow: hidden;
        }
        .scrollbar-thin::-webkit-scrollbar { width: 6px; }
        .scrollbar-thin::-webkit-scrollbar-track { background: transparent; }
        .scrollbar-thin::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        .animate-spin-custom { animation: spin 1s linear infinite; }
        
        /* 列印模式下的排版優化 (確保使用 Ctrl+P 也能正常使用) */
        @media print {
            @page { size: A4; margin: 0; }
            body { overflow: auto; background: white; }
            .no-print { display: none !important; }
            #report-area-container {
                position: relative !important;
                top: 0 !important;
                left: 0 !important;
                opacity: 1 !important;
                pointer-events: auto !important;
                display: flex !important;
                justify-content: center !important;
            }
            #report-area {
                box-shadow: none !important;
                width: 100% !important;
                max-width: 794px;
                border: none !important;
                padding: 2rem !important;
                min-height: auto !important;
            }
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useMemo, useRef, useEffect } = React;

        const categoryConfig = {
            dairy: { name: '乳品類', color: '#3b82f6', unitWeight: 240, badge: 'bg-blue-500', isPortionable: true },
            protein: { name: '豆魚蛋肉', color: '#ef4444', unitWeight: 37.5, badge: 'bg-red-500', isPortionable: true },
            vegetable: { name: '蔬菜類', color: '#22c55e', unitWeight: 100, badge: 'bg-green-500', isPortionable: true },
            grain: { name: '全榖雜糧', color: '#eab308', unitWeight: 40, badge: 'bg-yellow-500', isPortionable: true },
            fruit: { name: '水果類', color: '#ff9800', unitWeight: 100, badge: 'bg-orange-500', isPortionable: true },
            nut: { name: '油脂堅果', color: '#d97706', unitWeight: 10, badge: 'bg-amber-600', isPortionable: true },
            seasoning: { name: '調味料', color: '#94a3b8', unitWeight: 0, badge: 'bg-slate-400', isPortionable: false },
        };

        const INITIAL_CORE_DB = [
            // 乳品類
            { name: '鮮乳/鮮奶 (全脂)', calcium: 104, category: 'dairy', standardWeight: 240 },
            { name: '保久乳', calcium: 104, category: 'dairy', standardWeight: 240 },
            { name: '無糖優酪乳', calcium: 100, category: 'dairy', standardWeight: 240 },
            { name: '含糖優酪乳', calcium: 90, category: 'dairy', standardWeight: 240 },
            { name: '低脂優格/無糖優格', calcium: 120, category: 'dairy', standardWeight: 100 },
            { name: '切達起司片', calcium: 600, category: 'dairy', standardWeight: 20 },
            { name: '乳酪絲', calcium: 710, category: 'dairy', standardWeight: 20 },
            { name: '全脂奶粉', calcium: 912, category: 'dairy', standardWeight: 30 },
            // 豆魚蛋肉 (海鮮/豆品/蛋類)
            { name: '小魚乾', calcium: 2213, category: 'protein', standardWeight: 10 },
            { name: '蝦米/蝦皮', calcium: 1075, category: 'protein', standardWeight: 15 },
            { name: '櫻花蝦', calcium: 765, category: 'protein', standardWeight: 15 },
            { name: '小方豆乾', calcium: 685, category: 'protein', standardWeight: 35 },
            { name: '干絲', calcium: 551, category: 'protein', standardWeight: 35 },
            { name: '旗魚鬆', calcium: 466, category: 'protein', standardWeight: 20 },
            { name: '吻仔魚', calcium: 349, category: 'protein', standardWeight: 50 },
            { name: '傳統/五香豆乾', calcium: 273, category: 'protein', standardWeight: 35 },
            { name: '凍豆腐', calcium: 240, category: 'protein', standardWeight: 80 },
            { name: '黃豆 (乾)', calcium: 194, category: 'protein', standardWeight: 20 },
            { name: '黑豆 (乾)', calcium: 176, category: 'protein', standardWeight: 20 },
            { name: '板豆腐', calcium: 140, category: 'protein', standardWeight: 80 },
            { name: '無糖豆漿 (加鈣)', calcium: 120, category: 'protein', standardWeight: 240 },
            { name: '油豆腐', calcium: 119, category: 'protein', standardWeight: 35 },
            { name: '蛤蜊', calcium: 100, category: 'protein', standardWeight: 100 },
            { name: '毛豆仁', calcium: 69, category: 'protein', standardWeight: 50 },
            { name: '雞蛋', calcium: 50, category: 'protein', standardWeight: 55 },
            { name: '百頁豆腐', calcium: 33, category: 'protein', standardWeight: 50 },
            // 蔬菜類
            { name: '海帶芽 (乾)', calcium: 820, category: 'vegetable' },
            { name: '髮菜', calcium: 699, category: 'vegetable' },
            { name: '海帶 (乾)', calcium: 400, category: 'vegetable' },
            { name: '紫菜 (乾)', calcium: 282, category: 'vegetable' },
            { name: '紅莧菜', calcium: 191, category: 'vegetable' },
            { name: '芥藍菜', calcium: 181, category: 'vegetable' },
            { name: '九層塔', calcium: 177, category: 'vegetable' },
            { name: '莧菜', calcium: 156, category: 'vegetable' },
            { name: '綠莧菜', calcium: 146, category: 'vegetable' },
            { name: '皇宮菜', calcium: 122, category: 'vegetable' },
            { name: '地瓜葉/油菜', calcium: 105, category: 'vegetable' },
            { name: '青江菜', calcium: 104, category: 'vegetable' },
            { name: '小白菜', calcium: 73, category: 'vegetable' },
            // 全榖雜糧
            { name: '加鈣米', calcium: 250, category: 'grain' },
            { name: '燕麥片', calcium: 47, category: 'grain', standardWeight: 40 },
            // 油脂堅果
            { name: '黑芝麻 (熟)', calcium: 1479, category: 'nut', standardWeight: 7 },
            { name: '黑芝麻粉', calcium: 1450, category: 'nut', standardWeight: 7 },
            { name: '芝麻醬', calcium: 870, category: 'nut', standardWeight: 10 },
            { name: '奇亞籽', calcium: 631, category: 'nut', standardWeight: 10 },
            { name: '亞麻仁籽粉', calcium: 255, category: 'nut', standardWeight: 10 },
            { name: '杏仁果', calcium: 253, category: 'nut', standardWeight: 10 },
            { name: '開心果', calcium: 108, category: 'nut', standardWeight: 10 },
            // 調味料
            { name: '大蒜/蒜泥', calcium: 160, category: 'seasoning' },
            { name: '特級醬油', calcium: 25, category: 'seasoning' },
            { name: '食鹽', calcium: 2, category: 'seasoning' }
        ];

        const Icon = ({ name, size = 18, className = "" }) => {
            useEffect(() => {
                if (window.lucide) {
                    window.lucide.createIcons();
                }
            }, [name]);
            // 修復點 1: 用 span 包裹以避免 React unmount 時因 DOM 被 Lucide 替換而產生 crash
            return <span><i data-lucide={name} className={className} style={{ width: size, height: size, display: 'inline-block' }}></i></span>;
        };

        function App() {
            const [target, setTarget] = useState(110);
            const [recipeName, setRecipeName] = useState('活力高鈣午餐 A 選項');
            const [items, setItems] = useState([]);
            const [notes, setNotes] = useState('');
            const [searchQuery, setSearchQuery] = useState('');
            const [customDB, setCustomDB] = useState([]);
            const [isExporting, setIsExporting] = useState(false);
            const [importStatus, setImportStatus] = useState(null);
            
            const reportRef = useRef(null);
            const fileInputRef = useRef(null);

            const fullDB = useMemo(() => [...INITIAL_CORE_DB, ...customDB], [customDB]);
            const filteredDB = fullDB.filter(ing => ing.name.toLowerCase().includes(searchQuery.toLowerCase()));

            const totals = useMemo(() => {
                return items.reduce((acc, item) => {
                    const calcium = (item.weight / 100) * item.ingredient.calcium;
                    const config = categoryConfig[item.ingredient.category];
                    acc.calcium += calcium;
                    acc.totalWeight += item.weight;
                    if (config.isPortionable) {
                        const unit = item.ingredient.standardWeight || config.unitWeight;
                        acc.servings[item.ingredient.category] = (acc.servings[item.ingredient.category] || 0) + (item.weight / unit);
                    }
                    return acc;
                }, { calcium: 0, totalWeight: 0, servings: {} });
            }, [items]);

            const isAchieved = totals.calcium >= target;
            const progressPct = Math.min(totals.calcium / target, 1);

            const addItem = (ing) => {
                setItems(prev => [...prev, { 
                    id: Math.random().toString(36).substr(2, 9), 
                    ingredient: ing, 
                    weight: ing.standardWeight || 10 
                }]);
            };

            const removeItem = (id) => {
                setItems(prev => prev.filter(i => i.id !== id));
            };

            const updateWeight = (id, val) => {
                const numericVal = parseFloat(val) || 0;
                setItems(prev => prev.map(item => item.id === id ? { ...item, weight: numericVal } : item));
            };

            const handleCSVImport = (e) => {
                const file = e.target.files?.[0];
                if (!file) return;
                setImportStatus('解析中...');
                window.Papa.parse(file, {
                    complete: (results) => {
                        const parsed = results.data;
                        const newIngredients = parsed.slice(1).filter(r => r.length >= 2).map(r => {
                            let cat = 'seasoning';
                            const c = (r[2] || '').toLowerCase();
                            if (c.includes('乳')) cat = 'dairy';
                            else if (c.includes('豆') || c.includes('魚') || c.includes('肉')) cat = 'protein';
                            else if (c.includes('菜')) cat = 'vegetable';
                            else if (c.includes('榖')) cat = 'grain';
                            else if (c.includes('果')) cat = 'fruit';
                            else if (c.includes('油')) cat = 'nut';
                            return { name: r[0], calcium: parseFloat(r[1]) || 0, category: cat, standardWeight: parseFloat(r[3]) || undefined };
                        });
                        setCustomDB(prev => [...prev, ...newIngredients]);
                        setImportStatus(`匯入 ${newIngredients.length} 項`);
                        setTimeout(() => setImportStatus(null), 3000);
                    }
                });
            };

            const exportAsPDF = async () => {
                if (items.length === 0 || isExporting) return;
                try {
                    setIsExporting(true);
                    
                    // 給予一點時間確保按鈕動畫觸發完成，並避免 setState 造成的卡頓
                    await new Promise(r => setTimeout(r, 300)); 
                    
                    const el = reportRef.current;
                    const canvas = await window.html2canvas(el, { 
                        scale: 2,
                        useCORS: true, 
                        backgroundColor: '#ffffff',
                        logging: false,
                        // 修復點 2: 防止視窗滾動或偏移造成截圖空白
                        scrollY: 0,
                        scrollX: 0
                    });

                    const imgData = canvas.toDataURL('image/png');
                    const { jsPDF } = window.jspdf;
                    const pdf = new jsPDF('p', 'mm', 'a4');
                    
                    const pdfWidth = pdf.internal.pageSize.getWidth();
                    const pdfHeight = pdf.internal.pageSize.getHeight();
                    
                    const imgRatio = canvas.width / canvas.height;
                    let finalWidth = pdfWidth;
                    let finalHeight = finalWidth / imgRatio;

                    if (finalHeight > pdfHeight) {
                        finalHeight = pdfHeight;
                        finalWidth = finalHeight * imgRatio;
                    }

                    const xOffset = (pdfWidth - finalWidth) / 2;
                    const yOffset = 0;

                    pdf.addImage(imgData, 'PNG', xOffset, yOffset, finalWidth, finalHeight);
                    pdf.save(`${recipeName}_營養分析報告.pdf`);
                } catch (e) {
                    console.error("PDF Export Error:", e);
                    alert('匯出失敗，請檢查瀏覽器設定或使用鍵盤 Ctrl+P 直接列印。');
                } finally {
                    setIsExporting(false);
                }
            };

            return (
                <div className="h-screen p-4 flex flex-col gap-4 max-w-screen-2xl mx-auto w-full">
                    {/* Header */}
                    <header className="no-print bg-white rounded-2xl border p-4 flex flex-col md:flex-row justify-between items-center gap-4 shadow-sm">
                        <div className="flex items-center gap-4">
                            <div className="w-12 h-12 bg-blue-600 rounded-2xl flex items-center justify-center text-white font-black text-2xl italic">Ca</div>
                            <div>
                                <h1 className="text-xl font-black text-slate-800 tracking-tight">校園高鈣精密檢核系統</h1>
                                <p className="text-[10px] text-slate-400 font-bold uppercase tracking-widest leading-none mt-1 text-center md:text-left">Professional v3.0 Final</p>
                            </div>
                        </div>
                        <div className="flex items-center gap-4">
                            <div className="flex bg-slate-100 p-1 rounded-xl border">
                                <button onClick={() => setTarget(110)} className={`px-5 py-1.5 rounded-lg text-xs font-bold transition-all ${target === 110 ? 'bg-white shadow text-blue-600' : 'text-slate-400'}`}>國小 110</button>
                                <button onClick={() => setTarget(133.3)} className={`px-5 py-1.5 rounded-lg text-xs font-bold transition-all ${target === 133.3 ? 'bg-white shadow text-blue-600' : 'text-slate-400'}`}>國中 133.3</button>
                            </div>
                            <input type="file" accept=".csv" ref={fileInputRef} onChange={handleCSVImport} className="hidden" />
                            <button onClick={() => fileInputRef.current.click()} className="p-2.5 bg-white border rounded-xl hover:bg-slate-50 transition-all flex items-center gap-2">
                                <Icon name="database" className="text-blue-500" />
                                <span className="text-[10px] font-black uppercase text-slate-500">匯入資料庫</span>
                            </button>
                        </div>
                    </header>

                    <div className="no-print flex-1 grid grid-cols-1 md:grid-cols-[240px_1fr_220px] gap-4 min-h-0">
                        {/* Database Sidebar */}
                        <aside className="bg-white rounded-[2rem] border flex flex-col overflow-hidden shadow-sm">
                            <div className="p-4 border-b">
                                <div className="relative">
                                    <Icon name="search" size={14} className="absolute left-3 top-1/2 -translate-y-1/2 text-slate-400" />
                                    <input type="text" placeholder="搜尋食材..." value={searchQuery} onChange={e => setSearchQuery(e.target.value)} className="w-full pl-9 pr-4 py-2.5 bg-slate-50 rounded-xl text-xs font-bold outline-none border focus:border-blue-300 transition-all" />
                                </div>
                            </div>
                            <div className="flex-1 overflow-y-auto p-2 scrollbar-thin">
                                {filteredDB.map(ing => (
                                    <button key={ing.name} onClick={() => addItem(ing)} className="w-full flex items-center justify-between p-3 rounded-xl hover:bg-blue-50 mb-1 group transition-all text-left">
                                        <div className="flex items-center gap-2">
                                            <div className="w-1 h-5 rounded-full" style={{ backgroundColor: categoryConfig[ing.category].color }} />
                                            <span className="text-xs font-bold text-slate-600 group-hover:text-blue-700">{ing.name}</span>
                                        </div>
                                        <span className={`text-[9px] font-black px-1.5 py-0.5 rounded text-white ${categoryConfig[ing.category].badge}`}>{ing.calcium}</span>
                                    </button>
                                ))}
                            </div>
                            {importStatus && <div className="bg-blue-600 text-white text-[9px] font-black py-1.5 text-center">{importStatus}</div>}
                        </aside>

                        {/* Editor */}
                        <main className="bg-white rounded-[2.5rem] border flex flex-col overflow-hidden shadow-xl">
                            <div className="p-6 border-b flex justify-between items-center bg-white/50 backdrop-blur sticky top-0 z-10">
                                <input type="text" value={recipeName} onChange={e => setRecipeName(e.target.value)} className="text-2xl font-black text-slate-800 outline-none w-2/3 border-none bg-transparent" />
                                <div className="flex items-center gap-2 px-3 py-1 bg-slate-50 rounded-full text-[9px] font-black text-slate-400 border uppercase">Professional Matrix</div>
                            </div>
                            <div className="flex-1 overflow-y-auto scrollbar-thin">
                                <table className="w-full text-left">
                                    <thead className="sticky top-0 bg-slate-50/90 backdrop-blur z-20 text-[10px] font-black text-slate-400 border-b">
                                        <tr>
                                            <th className="px-6 py-4 uppercase tracking-widest">食材</th>
                                            <th className="px-6 py-4 uppercase tracking-widest text-center">重量 (g)</th>
                                            <th className="px-6 py-4 uppercase tracking-widest">鈣質(mg)</th>
                                            <th className="px-6 py-4 uppercase tracking-widest">份數</th>
                                            <th className="px-6 py-4"></th>
                                        </tr>
                                    </thead>
                                    <tbody className="divide-y divide-slate-50">
                                        {items.map(item => {
                                            const config = categoryConfig[item.ingredient.category];
                                            const unit = item.ingredient.standardWeight || config.unitWeight;
                                            return (
                                                <tr key={item.id} className="hover:bg-slate-50/50 group">
                                                    <td className="px-6 py-4 font-bold text-slate-700 text-sm">
                                                        <div className="flex items-center gap-2">
                                                            <div className="w-1.5 h-4 rounded-full" style={{ backgroundColor: config.color }} />
                                                            {item.ingredient.name}
                                                        </div>
                                                    </td>
                                                    <td className="px-6 py-4 text-center">
                                                        <input type="number" step="0.1" value={item.weight} onChange={e => updateWeight(item.id, e.target.value)} className="w-20 p-2 bg-slate-50 border rounded-xl text-center font-black text-sm outline-none focus:bg-white focus:ring-2 focus:ring-blue-100 transition-all shadow-inner" />
                                                    </td>
                                                    <td className="px-6 py-4 font-black text-blue-600">{(item.weight/100*item.ingredient.calcium).toFixed(1)}</td>
                                                    <td className="px-6 py-4 text-[10px] font-black text-slate-400">{config.isPortionable ? (item.weight/unit).toFixed(1) : '-'}</td>
                                                    <td className="px-6 py-4 text-right">
                                                        <button onClick={() => removeItem(item.id)} className="text-slate-200 hover:text-red-500 transition-colors"><Icon name="trash-2" size={16} /></button>
                                                    </td>
                                                </tr>
                                            )
                                        })}
                                        {items.length === 0 && (
                                            <tr><td colSpan="5" className="p-32 text-center text-slate-300 font-black italic opacity-20">請從左側加入食材</td></tr>
                                        )}
                                    </tbody>
                                </table>
                            </div>
                            <div className="p-6 bg-slate-50/50 border-t flex gap-6">
                                <textarea placeholder="備註與檢核建議..." value={notes} onChange={e => setNotes(e.target.value)} className="flex-1 p-4 bg-white border rounded-2xl text-xs font-bold outline-none h-24 resize-none shadow-sm focus:ring-4 focus:ring-blue-500/5 transition-all" />
                                <div className="w-48 flex flex-col justify-end">
                                    <button onClick={exportAsPDF} disabled={isExporting} className="w-full bg-blue-600 text-white rounded-[1.5rem] py-5 font-black text-sm flex items-center justify-center gap-2 hover:bg-blue-500 shadow-xl shadow-blue-100 transition-all active:scale-95">
                                        {isExporting ? (
                                            <div className="flex items-center gap-2">
                                                <div className="w-5 h-5 border-2 border-white/30 border-t-white rounded-full animate-spin-custom" />
                                                <span>處理中...</span>
                                            </div>
                                        ) : (
                                            <div className="flex items-center gap-2">
                                                <Icon name="download" /> 
                                                <span>產出 PDF 單頁報告</span>
                                            </div>
                                        )}
                                    </button>
                                </div>
                            </div>
                        </main>

                        {/* Status Sidebar */}
                        <aside className="flex flex-col gap-4 overflow-hidden">
                            <section className="bg-white rounded-[2rem] border p-6 flex flex-col items-center shadow-sm">
                                <h3 className="text-[10px] font-black text-slate-400 mb-6 tracking-widest uppercase">Progress Ring</h3>
                                <div className="relative w-36 h-36 flex items-center justify-center">
                                    <svg className="w-full h-full -rotate-90"><circle cx="72" cy="72" r="64" stroke="#f1f5f9" strokeWidth="12" fill="transparent" /><circle cx="72" cy="72" r="64" stroke={isAchieved ? '#22c55e' : '#3b82f6'} strokeWidth="12" strokeDasharray="402" strokeDashoffset={402 - (progressPct * 402)} fill="transparent" strokeLinecap="round" style={{ transition: '1s cubic-bezier(0.4, 0, 0.2, 1)' }} /></svg>
                                    <div className="absolute flex flex-col items-center">
                                        <span className="text-3xl font-black text-slate-800 tracking-tighter">{totals.calcium.toFixed(0)}</span>
                                        <span className="text-[9px] font-bold text-slate-400">/ {target} mg</span>
                                    </div>
                                </div>
                                <div className={`mt-6 w-full py-2.5 rounded-xl text-[10px] font-black text-center border shadow-sm ${isAchieved ? 'bg-green-500 text-white border-green-400' : 'bg-slate-50 text-slate-400'}`}>
                                    {isAchieved ? '✨ 達標' : `需補充 ${(target-totals.calcium).toFixed(0)}mg`}
                                </div>
                            </section>

                            <section className="bg-white rounded-[2rem] border p-5 flex-1 overflow-y-auto shadow-sm scrollbar-thin">
                                <h3 className="text-[10px] font-black text-slate-400 mb-6 tracking-widest uppercase text-center border-b pb-2">Category Logic</h3>
                                {Object.entries(categoryConfig).map(([k, c]) => {
                                    if (!c.isPortionable) return null;
                                    const val = totals.servings[k] || 0;
                                    return (
                                        <div key={k} className="mb-5 last:mb-0">
                                            <div className="flex justify-between text-[10px] font-bold mb-1.5 px-0.5"><span>{c.name}</span><span className="font-black italic">{val.toFixed(1)} 份</span></div>
                                            <div className="h-2 bg-slate-50 rounded-full overflow-hidden shadow-inner border border-slate-100"><div className="h-full transition-all duration-1000" style={{ width: `${Math.min(val*40, 100)}%`, backgroundColor: c.color }} /></div>
                                        </div>
                                    )
                                })}
                            </section>
                        </aside>
                    </div>

                    {/* Report Render Area (確保 top=0, left=-9999px 才不會讓 html2canvas 發生偏移抓空白的狀況) */}
                    <div id="report-area-container" style={{ position: 'absolute', top: '0', left: '-9999px', pointerEvents: 'none', zIndex: -10 }}>
                        <div id="report-area" ref={reportRef} className="w-[794px] min-h-[1123px] p-12 bg-white text-slate-900 flex flex-col justify-start">
                            
                            {/* 標題區 */}
                            <div className="border-b-[6px] border-blue-600 pb-6 mb-8 flex justify-between items-end">
                                <div>
                                    <h1 className="text-4xl font-black italic tracking-tighter mb-2 text-slate-800">{recipeName}</h1>
                                    <p className="text-sm text-slate-400 font-bold tracking-widest uppercase italic">Campus Nutrition Design Report</p>
                                </div>
                                <div className="text-right flex flex-col items-end">
                                    <div className="text-sm font-bold text-slate-400 mb-2">{new Date().toLocaleDateString('zh-TW')}</div>
                                    <div className={`px-4 py-1.5 rounded-full text-sm font-black shadow-md ${isAchieved ? 'bg-green-500 text-white' : 'bg-blue-600 text-white'}`}>檢核基準：{target.toFixed(1)}mg</div>
                                </div>
                            </div>
                            
                            {/* 統計總覽區 */}
                            <div className="grid grid-cols-2 gap-6 mb-8">
                                <div className="bg-slate-50 p-6 rounded-[2rem] text-center flex flex-col justify-center border border-slate-100">
                                    <span className="text-xs font-black text-slate-400 block mb-2 uppercase tracking-[0.2em]">Total Calcium</span>
                                    <span className="text-6xl font-black text-blue-600 italic tracking-tighter">{totals.calcium.toFixed(1)} <span className="text-xl not-italic text-blue-400 font-bold">mg</span></span>
                                </div>
                                <div className="bg-slate-50 p-6 rounded-[2rem] flex flex-col justify-center gap-3 border border-slate-100">
                                    {Object.entries(categoryConfig).map(([k, c]) => c.isPortionable && (
                                        <div key={k} className="flex justify-between border-b pb-1.5 border-slate-200/60 last:border-0 last:pb-0">
                                            <span className="text-sm font-bold text-slate-500">{c.name}</span>
                                            <span className="text-base font-black italic text-slate-700">{(totals.servings[k] || 0).toFixed(1)} 份</span>
                                        </div>
                                    ))}
                                </div>
                            </div>
                            
                            {/* 食材明細表格區 */}
                            <table className="w-full mb-8 border border-slate-200 rounded-2xl overflow-hidden shadow-sm">
                                <thead className="bg-slate-800 text-white">
                                    <tr>
                                        <th className="p-4 text-left text-sm tracking-wider">食材明細</th>
                                        <th className="p-4 text-center text-sm tracking-wider">重量 (g)</th>
                                        <th className="p-4 text-right text-sm tracking-wider">鈣質 (mg)</th>
                                    </tr>
                                </thead>
                                <tbody className="divide-y divide-slate-100 bg-white">
                                    {items.map(i => (
                                        <tr key={i.id}>
                                            <td className="p-4 font-bold text-base text-slate-700">{i.ingredient.name}</td>
                                            <td className="p-4 text-center font-bold text-sm text-slate-500">{i.weight}g</td>
                                            <td className="p-4 text-right font-black text-blue-600 text-lg">{(i.weight/100*i.ingredient.calcium).toFixed(1)}</td>
                                        </tr>
                                    ))}
                                    {items.length === 0 && (
                                        <tr><td colSpan="3" className="p-10 text-center text-slate-300 font-bold">目前無任何食材</td></tr>
                                    )}
                                </tbody>
                            </table>
                            
                            {/* 備註建議區 */}
                            {notes && (
                                <div className="p-6 bg-blue-50/50 rounded-3xl border-2 border-dashed border-blue-200 italic font-bold text-base leading-relaxed text-blue-900 whitespace-pre-wrap mt-auto">
                                    {notes}
                                </div>
                            )}
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
